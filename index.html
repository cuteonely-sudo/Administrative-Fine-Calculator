<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과태료 가산금 계산기</title>

    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <h1>과태료 가산금 계산기</h1>

        <div class="subtitle">
            최초 5% + 매주 10% 가산
        </div>

        <div class="input-group">
            <label>과태료 원금</label>
            <input type="number" id="amount" placeholder="예: 750000">
        </div>

        <div class="input-group">
            <label>납부기한</label>
            <input type="date" id="dueDate">
        </div>

        <button onclick="calculate()">
            계산하기
        </button>

        <div class="result">

            <div class="result-box">
                <span>경과일</span>
                <strong id="days">0일</strong>
            </div>

            <div class="result-box">
                <span>경과주</span>
                <strong id="weeks">0주</strong>
            </div>

            <div class="result-box">
                <span>5% 가산금</span>
                <strong id="fivePercent">0원</strong>
            </div>

            <div class="result-box">
                <span>주간 가산금</span>
                <strong id="weeklyFee">0원</strong>
            </div>

            <div class="result-box">
                <span>총 가산금</span>
                <strong id="totalPenalty">0원</strong>
            </div>

            <div class="result-box total">
                <span>최종 납부금액</span>
                <strong id="finalAmount">0원</strong>
            </div>

        </div>

    </div>

</div>

<script src="index.js"></script>

</body>
</html>
